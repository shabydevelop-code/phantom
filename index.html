                     <p>הורד את תמונת דיסק המשחק הווירטואלי:</p>
                     <ul>
                         <li><a href="https://www.dragon-it.co.uk/discs/games_03.vdk" target="_blank" rel="noopener">הורד את Games_03.vdk</a></li>
                     </ul>
                     <p>הדבק את קובץ ה-vdk ישירות לתיקיית <strong>XRoar</strong>.</p>`,
                    `<h1>> שלב 4: יצירת סקריפט</h1>
                     <p>פתח את <strong>פנקס הרשימות (Notepad)</strong> והדבק את הפקודה המדויקת הזו:</p>
                     <div class="code-container">
                         <div class="code-block" id="commandText">.\\xroar.exe -load-fd0 "Games_03.vdk" -type "LOAD\\\"PHANTOM\\\":EXEC\\r"</div>
                         <button class="copy-button" id="copyBtn" aria-label="העתק פקודה" onclick="copyToClipboard()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                     </div>
                     <p>שמור את הקובץ כסקריפט אצווה (Batch) בתוך תיקיית <strong>XRoar</strong>:</p>
                     <ul>
                         <li>לחץ על <strong>קובץ > שמירה בשם...</strong></li>
                         <li>הגדר "שמור כסוג" ל<strong>כל הקבצים (*.*)</strong></li>
                         <li>תן לקובץ את השם: <strong>phantom.bat</strong></li>
                         <li>שמור אותו ישירות בתוך תיקיית <strong>XRoar</strong></li>
                     </ul>`,
                    `<h1>> מצב צייד (הצעה בתשלום)</h1>
                     <p>הפעל צ'יטים על-חושיים במבוך:</p>
                     <ul>
                         <li><strong>הריגה בירייה אחת:</strong> חסל פנטומים בירייה בודדת של לייזר.</li>
                         <li><strong>מפה מקיפה:</strong> לחץ על המקש <kbd style="background: #222; padding: 2px 6px; border: 1px solid var(--neon-green); border-radius: 3px; font-family: var(--terminal-font);">D</kbd> כדי לצפות במפה הדו-ממדית בכל עת.</li>
                         <li><strong>מגן פנטומים:</strong> הפנטומים לא יכולים לפגוע בך אלא אם כן תצעד ישירות לתוכם.</li>
                     </ul>
                     <p>ההישרדות מובטחת.</p>
                      <p style="font-size: 1.2rem; font-weight: bold; border: 1px solid var(--neon-green); padding: 6px 12px; display: inline-block; margin: 15px 0; border-radius: 4px; background: rgba(255, 51, 0, 0.1);">מחיר: 30 ש"ח</p>
                     <p><strong>יתרונות קוגניטיביים:</strong> מצב צייד מספק סביבת אימון ללא לחץ, מה שמקל על שחקנים לתרגל פיתוח ראייה מרחבית ומיפוי מבוכים קוגניטיבי ללא הפרעות מצד הפנטומים.</p>
                     <p style="margin-top: 18px;">למידע נוסף: <a href="mailto:shaby.develop@gmail.com">שלח אימייל למפתח</a></p>`,
                    `<h1>> האתחול הושלם</h1>
                     <p>אתה מוכן לשחק כעת.</p>
                     <p><strong>פעולה:</strong> לחץ פעמיים על <strong>phantom.bat</strong> בתיקייה שלך.</p>
                     <p>בהצלחה במבוך.</p>`
                ]
            }
        };

        // Initialize hardware back-button history state
        window.history.replaceState({slide: 0}, "", "");

        function renderSlides() {
            const wrapper = document.querySelector('.slide-wrapper');
            const currentLocale = locales[currentLang];

            // Set document and container language attributes
            document.documentElement.lang = currentLang;
            const container = document.querySelector('.presentation-container');
            if (currentLang === 'he') {
                document.body.classList.add('rtl');
                container.classList.add('rtl');
            } else {
                document.body.classList.remove('rtl');
                container.classList.remove('rtl');
            }

            // Generate slide contents dynamically
            wrapper.innerHTML = currentLocale.slides.map((slideContent, index) => {
                const isActive = index === currentSlide ? 'active' : '';
                return `<section class="slide ${isActive}" aria-labelledby="slide${index+1}-title">${slideContent}</section>`;
            }).join('');

            // Update page metadata & language button
            document.title = currentLocale.title;
            prevBtn.textContent = currentLocale.prev;
            nextBtn.textContent = currentLocale.next;
            langBtn.textContent = currentLocale.langText;
            langBtn.setAttribute('aria-label', currentLocale.langAria);

            // Update mute button language text & aria
            const muteBtn = document.getElementById('muteBtn');
            if (isMuted) {
                muteBtn.innerHTML = speakerOffSvg;
                muteBtn.setAttribute('aria-label', currentLocale.unmuteAria);
            } else {
                muteBtn.innerHTML = speakerOnSvg;
                muteBtn.setAttribute('aria-label', currentLocale.muteAria);
            }

            // Generate progress bar segments dynamically (N-1 segments representing transitions between slides)
            const progressContainer = document.getElementById('progressContainer');
            progressContainer.innerHTML = currentLocale.slides.slice(0, -1).map((_, index) => {
                return `<div class="progress-segment" onclick="goToSlide(${index + 1})" role="button" aria-label="Go to slide ${index + 2}" tabindex="0"></div>`;
            }).join('');

            // Re-select slides DOM elements
            slides = document.querySelectorAll('.slide');
            updateUI();
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'he' : 'en';
            renderSlides();
        }

        function toggleMute() {
            isMuted = !isMuted;
            const currentLocale = locales[currentLang];
            const muteBtn = document.getElementById('muteBtn');
            if (isMuted) {
                muteBtn.innerHTML = speakerOffSvg;
                muteBtn.setAttribute('aria-label', currentLocale.unmuteAria);
            } else {
                muteBtn.innerHTML = speakerOnSvg;
                muteBtn.setAttribute('aria-label', currentLocale.muteAria);
            }
        }

        function updateUI() {
            if (!slides || slides.length === 0) return;
            // Update active slide
            slides.forEach((slide, index) => {
                slide.classList.toggle('active', index === currentSlide);
            });

            // Toggle special Hunter Mode color theme (Slide index 5)
            const isHunterSlide = (currentSlide === 5);
            document.body.classList.toggle('hunter-mode-active', isHunterSlide);

            // Update Progress Bar Segments (Highlight completed steps: S active on slide S, 0 active on slide 0)
            const segments = document.querySelectorAll('.progress-segment');
            segments.forEach((seg, index) => {
                seg.classList.toggle('active', index < currentSlide);
            });

            // Handle Button States (Prevent Loop)
            prevBtn.disabled = (currentSlide === 0);
            nextBtn.disabled = (currentSlide === slides.length - 1);
        }

        function goToSlide(index, isPopstate = false) {
            if (index >= 0 && index < slides.length) {
                currentSlide = index;
                updateUI();
                
                // Play step sound, or play game over sound if reaching the final slide
                if (!isMuted) {
                    if (currentSlide === slides.length - 1) {
                        gameOverAudio.currentTime = 0;
                        gameOverAudio.play().catch(err => {
                            console.warn("Game over audio playback failed:", err);
                        });
                    } else {
                        stepAudio.currentTime = 0;
                        stepAudio.play().catch(err => {
                            console.warn("Step audio playback failed:", err);
                        });
                    }
                }

                // Push history state if not triggered by hardware back button (popstate)
                if (!isPopstate) {
                    window.history.pushState({slide: currentSlide}, "", "");
                }
            }
        }

        function changeSlide(direction, isPopstate = false) {
            goToSlide(currentSlide + direction, isPopstate);
        }

        // Hardware Back-Button Logic
        window.addEventListener('popstate', (event) => {
            if (event.state && typeof event.state.slide === 'number') {
                const targetSlide = event.state.slide;
                const diff = targetSlide - currentSlide;
                if (diff !== 0) {
                    changeSlide(diff, true);
                }
            }
        });

        // Swipe Gesture controls for touch screens
        let touchStartX = 0;
        let touchEndX = 0;
        const gestureArea = document.querySelector('.presentation-container');

        gestureArea.addEventListener('touchstart', (event) => {
            touchStartX = event.changedTouches[0].screenX;
        }, { passive: true });

        gestureArea.addEventListener('touchend', (event) => {
            touchEndX = event.changedTouches[0].screenX;
            handleSwipeGesture();
        }, { passive: true });

        function handleSwipeGesture() {
            const minSwipeDistance = 50; // pixels
            if (touchEndX < touchStartX - minSwipeDistance) {
                // Swipe Left -> Next
                if (currentSlide < slides.length - 1) {
                    changeSlide(1);
                }
            }
            if (touchEndX > touchStartX + minSwipeDistance) {
                // Swipe Right -> Prev
                if (currentSlide > 0) {
                    changeSlide(-1);
                }
            }
        }

        // Copy command logic
        const copySvg = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
        const checkSvg = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><polyline points="20 6 9 17 4 12"></polyline></svg>`;

        function copyToClipboard() {
            const cmdElement = document.getElementById('commandText');
            const cmdText = cmdElement.textContent || cmdElement.innerText;
            
            navigator.clipboard.writeText(cmdText).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerHTML = checkSvg;
                setTimeout(() => {
                    btn.innerHTML = copySvg;
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy command to clipboard:', err);
            });
        }

        // Keyboard Arrow Navigation for complete navigability (WCAG 2.1 AAA compliance)
        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowLeft') {
                if (currentSlide > 0) changeSlide(-1);
            } else if (event.key === 'ArrowRight') {
                if (currentSlide < slides.length - 1) changeSlide(1);
            }
        });

        // Accessibility: allow Space/Enter keys to navigate when focusing on progress bar segments
        progressContainer.addEventListener('keydown', (event) => {
            if ((event.key === 'Enter' || event.key === ' ') && event.target.classList.contains('progress-segment')) {
                event.preventDefault();
                event.target.click();
            }
        });

        // Initialize UI on load
        renderSlides();
    </script>
</body>
